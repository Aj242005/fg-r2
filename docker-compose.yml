# ============================================
# Traffic Violation Detection System
# Docker Compose — GCP Deployment
# ============================================
#
# Usage:
#   1. docker compose up -d --build
#   2. PostgreSQL runs locally inside the VM alongside the app.
#
# Ports exposed to the internet:
#   80  → Caddy (HTTP, auto-redirects to HTTPS)
#   443 → Caddy (HTTPS with auto Let's Encrypt cert)
#
# Internal only:
#   8000 → FastAPI (only accessible via Caddy)
#   5432 → PostgreSQL (only accessible by app container)
# ============================================

services:
  # ── PostgreSQL Database (local to the VM) ──
  db:
    image: postgres:16-alpine
    container_name: traffic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traffic_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: violation-api
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      # Persist trained model files (so you can update without rebuild)
      - ./models:/app/models:ro
      # Persist output (annotated images, reports)
      - app-output:/app/output
      # Persist EasyOCR downloaded language models
      - easyocr-cache:/app/.easyocr
    environment:
      - PYTHONUNBUFFERED=1
      - EASYOCR_MODULE_PATH=/app/.easyocr
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/traffic_db
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    # Memory limit — keeps the container from OOM-killing the VM
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  # ── Caddy Reverse Proxy (auto TLS via Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # TLS certificates
      - caddy-config:/config   # Caddy runtime config
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy

volumes:
  pg-data:
    driver: local
  app-output:
    driver: local
  easyocr-cache:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  backend:
    driver: bridge
